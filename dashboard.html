<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PT 일지 대시보드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F4F4F2;
  --sf:#FFFFFF;
  --sf2:#F0F0EE;
  --t:#1A1A1A;
  --t2:#555;
  --t3:#999;
  --bd:#E0E0DC;
  --g0:#2D6A1F;
  --g1:#3D8A2A;
  --g2:#EAF3DE;
  --red:#E8503A;
  --red-l:#FDECEA;
  --yellow:#F5C842;
  --yellow-l:#FFFBE6;
  --blue:#3A8AE8;
  --blue-l:#E6F1FB;
  --r8:8px;--r12:12px;--r16:16px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;}

/* NAV */
.nav{background:var(--sf);border-bottom:0.5px solid var(--bd);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-title{font-size:16px;font-weight:700;color:var(--t);}
.nav-badge{font-size:11px;color:var(--t3);background:var(--sf2);border:0.5px solid var(--bd);border-radius:20px;padding:3px 10px;}

/* LOGIN */
.login-wrap{max-width:360px;margin:80px auto;padding:0 20px;}
.login-card{background:var(--sf);border:0.5px solid var(--bd);border-radius:var(--r16);padding:32px 24px;}
.login-title{font-size:22px;font-weight:700;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--t3);margin-bottom:24px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px;}
.field input{width:100%;padding:11px 14px;border:0.5px solid var(--bd);border-radius:var(--r8);font-size:15px;font-family:inherit;outline:none;background:var(--sf2);}
.field input:focus{border-color:var(--g1);}
.btn-login{width:100%;padding:13px;background:var(--g0);color:#fff;border:none;border-radius:var(--r12);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;}
.err{font-size:12px;color:var(--red);margin-top:8px;display:none;}

/* MAIN */
.main{max-width:960px;margin:0 auto;padding:24px 20px;}

/* SUMMARY CARDS */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px;}
.summary-card{background:var(--sf);border:0.5px solid var(--bd);border-radius:var(--r16);padding:16px 18px;}
.summary-label{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.05em;margin-bottom:6px;}
.summary-value{font-size:28px;font-weight:700;color:var(--t);}
.summary-sub{font-size:11px;color:var(--t3);margin-top:4px;}
.summary-card.alert .summary-value{color:var(--red);}
.summary-card.good .summary-value{color:var(--g0);}

/* FILTER */
.filter-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.filter-btn{padding:6px 14px;border-radius:20px;border:0.5px solid var(--bd);background:var(--sf);font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;font-family:inherit;}
.filter-btn.active{background:var(--g0);color:#fff;border-color:var(--g0);}

/* TRAINER TABLE */
.section-title{font-size:13px;font-weight:700;color:var(--t);margin-bottom:10px;letter-spacing:.02em;}
.trainer-list{display:flex;flex-direction:column;gap:10px;margin-bottom:32px;}
.trainer-card{background:var(--sf);border:0.5px solid var(--bd);border-radius:var(--r16);overflow:hidden;}
.trainer-header{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.trainer-avatar{width:40px;height:40px;border-radius:50%;background:var(--g2);border:0.5px solid var(--g3,#cde8b0);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--g0);flex-shrink:0;}
.trainer-info{flex:1;min-width:0;}
.trainer-name{font-size:15px;font-weight:700;color:var(--t);}
.trainer-meta{font-size:12px;color:var(--t3);margin-top:2px;}
.trainer-stats{display:flex;gap:16px;flex-shrink:0;}
.stat-item{text-align:center;}
.stat-num{font-size:18px;font-weight:700;color:var(--t);}
.stat-num.warn{color:var(--red);}
.stat-num.ok{color:var(--g0);}
.stat-label{font-size:10px;color:var(--t3);margin-top:1px;}
.trainer-body{border-top:0.5px solid var(--bd);display:none;}
.trainer-body.open{display:block;}

/* MEMBER ROWS */
.member-row{padding:10px 18px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;gap:10px;}
.member-row:last-child{border-bottom:none;}
.member-name-col{font-size:13px;font-weight:600;color:var(--t);width:80px;flex-shrink:0;}
.member-date{font-size:12px;color:var(--t3);flex:1;}
.sent-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;}
.sent-badge.sent{background:var(--g2);color:var(--g0);}
.sent-badge.unsent{background:var(--red-l);color:var(--red);}
.sent-count{font-size:11px;color:var(--t3);margin-left:4px;}

/* INTENSITY BAR */
.intensity-bar{height:4px;border-radius:2px;background:var(--bd);width:60px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:6px;}
.intensity-fill{height:100%;border-radius:2px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:var(--sf);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:88vh;display:flex;flex-direction:column;}
.modal-handle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:12px auto 0;}
.modal-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 10px;}
.modal-title-text{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;font-size:22px;color:var(--t3);cursor:pointer;line-height:1;}
.modal-scroll{overflow-y:auto;padding:0 18px 32px;}
.detail-section{margin-bottom:18px;}
.detail-eyebrow{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.06em;margin-bottom:8px;}
.detail-ex-card{background:var(--sf2);border:0.5px solid var(--bd);border-radius:var(--r12);margin-bottom:8px;overflow:hidden;}
.detail-ex-name{padding:10px 14px 6px;font-size:14px;font-weight:700;}
.detail-set-row{display:flex;align-items:center;padding:5px 14px;font-size:13px;gap:8px;border-top:0.5px solid var(--bd);}
.detail-set-idx{color:var(--t3);width:36px;flex-shrink:0;}
.detail-set-main{flex:1;color:var(--t);}
.detail-set-vol{color:var(--t3);font-size:11px;}
.detail-ex-comment{padding:8px 14px;font-size:12px;color:var(--t2);border-top:0.5px solid var(--bd);line-height:1.6;}
.detail-letter{background:var(--g2);border:0.5px solid var(--g3,#cde8b0);border-radius:var(--r12);padding:14px;font-size:13px;color:var(--t);line-height:1.8;white-space:pre-wrap;}
.detail-stats-row{display:flex;gap:12px;flex-wrap:wrap;}
.detail-stat{background:var(--sf2);border:0.5px solid var(--bd);border-radius:var(--r8);padding:8px 12px;text-align:center;}
.detail-stat-num{font-size:16px;font-weight:700;color:var(--t);}
.detail-stat-label{font-size:10px;color:var(--t3);margin-top:2px;}

.loading{text-align:center;padding:60px 20px;color:var(--t3);font-size:14px;}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--t3);font-size:13px;}
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-title">🏋️ PT 일지 대시보드</span>
  <div style="display:flex;align-items:center;gap:8px;">
    <span class="nav-badge" id="navDate"></span>
    <button id="settingsBtn" onclick="openPinChange()" style="display:none;background:none;border:0.5px solid var(--bd);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--t2);cursor:pointer;font-family:inherit;">⚙️ PIN 변경</button>
  </div>
</nav>

<!-- PIN 변경 모달 -->
<div id="pinChangeModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:center;justify-content:center;">
  <div style="background:var(--sf);border-radius:var(--r16);padding:28px 24px;width:320px;max-width:90vw;">
    <div style="font-size:16px;font-weight:700;margin-bottom:16px;">마스터 PIN 변경</div>
    <div class="field"><label>현재 PIN</label><input id="currentPinInput" type="password" inputmode="numeric" placeholder="• • • • • •" maxlength="10"/></div>
    <div class="field"><label>새 PIN</label><input id="newPinInput" type="password" inputmode="numeric" placeholder="• • • • • •" maxlength="10"/></div>
    <div class="field"><label>새 PIN 확인</label><input id="newPinConfirm" type="password" inputmode="numeric" placeholder="• • • • • •" maxlength="10"/></div>
    <div id="pinChangeErr" style="font-size:12px;color:var(--red);margin-bottom:10px;display:none;"></div>
    <div style="display:flex;gap:8px;">
      <button onclick="closePinChange()" style="flex:1;padding:11px;background:none;border:0.5px solid var(--bd);border-radius:var(--r8);font-size:14px;cursor:pointer;font-family:inherit;color:var(--t2);">취소</button>
      <button onclick="doChangeMasterPin()" style="flex:1;padding:11px;background:var(--g0);border:none;border-radius:var(--r8);font-size:14px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;">변경</button>
    </div>
  </div>
</div>

<div id="loginSection">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-title">🏋️ 대표님 로그인</div>
      <div class="login-sub">마스터 비밀번호를 입력하면 트레이너 현황을 볼 수 있어요</div>
      <div class="field"><label>마스터 비밀번호</label><input id="masterPin" type="password" inputmode="numeric" placeholder="• • • • • •" maxlength="10"/></div>
      <div class="err" id="loginErr">비밀번호를 확인해주세요</div>
      <button class="btn-login" onclick="doMasterLogin()">확인</button>
    </div>
  </div>
</div>

<div id="trainerSelectSection" style="display:none;">
  <div class="main" style="max-width:480px;">
    <div style="font-size:18px;font-weight:700;margin-bottom:4px;">트레이너 선택</div>
    <div style="font-size:13px;color:var(--t3);margin-bottom:18px;">확인할 트레이너를 선택하세요</div>
    <div id="trainerSelectList"></div>
    <button onclick="doLogout()" style="width:100%;margin-top:14px;padding:11px;background:none;border:0.5px solid var(--bd);border-radius:var(--r12);font-size:13px;color:var(--t3);cursor:pointer;font-family:inherit;">로그아웃</button>
  </div>
</div>

<div id="mainSection" style="display:none;">
  <div class="main">
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
      <button class="filter-btn" onclick="setFilter('week',this)">이번 주</button>
      <button class="filter-btn" onclick="setFilter('month',this)">이번 달</button>
      <button class="filter-btn" onclick="setFilter('unsent',this)">미전송만</button>
    </div>
    <div class="section-title">트레이너별 현황</div>
    <div class="trainer-list" id="trainerList"></div>
  </div>
</div>

<!-- 일지 상세 모달 -->
<div class="modal-overlay" id="journalModal" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-nav">
      <span class="modal-title-text" id="modalTitle"></span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-scroll" id="modalBody"></div>
  </div>
</div>

<script>
const FS_PROJECT = 'captaingym-1ccd2';
const FS_BASE = `https://firestore.googleapis.com/v1/projects/${FS_PROJECT}/databases/(default)/documents`;

let currentFilter = 'all';
let dashData = {}; // { members, history, sent }
let TRAINER_ID = null;

// 날짜 표시
const now = new Date();
const days = ['일','월','화','수','목','금','토'];
document.getElementById('navDate').textContent =
  `${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;

async function fsGet(col, docId){
  try{
    const res = await fetch(`${FS_BASE}/${col}/${encodeURIComponent(docId)}`);
    if(!res.ok) return null;
    const doc = await res.json();
    if(!doc.fields || !doc.fields.v) return null;
    return JSON.parse(doc.fields.v.stringValue);
  } catch(e){ return null; }
}

async function fsSet(col, docId, value){
  try{
    const body = {fields: {v: {stringValue: JSON.stringify(value)}}};
    await fetch(
      `${FS_BASE}/${col}/${encodeURIComponent(docId)}?updateMask.fieldPaths=v`,
      {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)}
    );
  } catch(e){}
}

function nameToId(name, pin){
  const safeName = name.trim().replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_가-힣]/g,'');
  return safeName + '_' + (pin||'0000');
}

function getShortDate(d){
  const date = d ? new Date(d) : new Date();
  return `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')}`;
}

function isThisWeek(dateStr){
  const d = new Date(dateStr);
  const today = new Date();
  const startOfWeek = new Date(today);
  startOfWeek.setDate(today.getDate() - today.getDay());
  startOfWeek.setHours(0,0,0,0);
  return d >= startOfWeek;
}

function isThisMonth(dateStr){
  const d = new Date(dateStr);
  const today = new Date();
  return d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
}

const MASTER_PIN_KEY = 'admin_master_pin';

// 마스터 비밀번호 — Firestore admin/config에 저장
// 없으면 최초 설정
async function doMasterLogin(){
  const pin = document.getElementById('masterPin').value.trim();
  if(!pin){ showErr(true); return; }

  // admin/config에서 마스터 PIN 확인
  let config = await fsGet('admin', 'config');
  if(!config){
    // 최초 설정 — 지금 입력한 게 마스터 PIN이 됨
    config = { masterPin: pin, createdAt: new Date().toISOString() };
    await fsSet('admin', 'config', config);
  }
  if(config.masterPin !== pin){ showErr(true); return; }

  showErr(false);
  sessionStorage.setItem('master_authed', '1');
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('settingsBtn').style.display = 'block';
  showTrainerList();
}

async function showTrainerList(){
  document.getElementById('trainerSelectSection').style.display = 'block';
  const listEl = document.getElementById('trainerSelectList');
  listEl.innerHTML = '<div class="loading">트레이너 목록 불러오는 중...</div>';

  const dir = await fsGet('admin', 'trainer_directory') || {};
  const trainers = Object.values(dir).sort((a,b)=>a.name.localeCompare(b.name));

  if(trainers.length === 0){
    listEl.innerHTML = '<div class="empty">아직 등록된 트레이너가 없어요<br><br>트레이너 앱에서 로그인하면 자동으로 등록돼요</div>';
    return;
  }

  listEl.innerHTML = '';
  trainers.forEach(t => {
    const card = document.createElement('div');
    card.style.cssText = 'background:var(--sf);border:0.5px solid var(--bd);border-radius:var(--r16);padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .12s;';
    card.innerHTML = `
      <div style="width:42px;height:42px;border-radius:50%;background:var(--g2);border:0.5px solid #cde8b0;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:var(--g0);flex-shrink:0;">${t.name[0]}</div>
      <div style="flex:1;">
        <div style="font-size:15px;font-weight:600;color:var(--t);">${t.name} 트레이너</div>
        <div style="font-size:12px;color:var(--t3);margin-top:2px;">탭해서 현황 보기</div>
      </div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>`;
    card.onmouseenter = ()=>card.style.background='var(--sf2)';
    card.onmouseleave = ()=>card.style.background='var(--sf)';
    card.onclick = () => selectTrainer(t);
    listEl.appendChild(card);
  });
}

function selectTrainer(t){
  TRAINER_ID = t.trainerId;
  document.getElementById('trainerSelectSection').style.display = 'none';
  document.getElementById('mainSection').style.display = 'block';
  // 네비 뒤로가기 버튼 추가
  document.getElementById('navDate').innerHTML = `<button onclick="backToList()" style="background:none;border:0.5px solid var(--bd);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--t2);cursor:pointer;font-family:inherit;">← 목록</button>`;
  loadDashboard();
}

function backToList(){
  document.getElementById('mainSection').style.display = 'none';
  document.getElementById('trainerSelectSection').style.display = 'block';
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('navDate').textContent = `${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;
  TRAINER_ID = null;
}

function doLogout(){
  sessionStorage.removeItem('master_authed');
  document.getElementById('trainerSelectSection').style.display = 'none';
  document.getElementById('loginSection').style.display = 'block';
  document.getElementById('settingsBtn').style.display = 'none';
  document.getElementById('masterPin').value = '';
}

function openPinChange(){
  document.getElementById('currentPinInput').value = '';
  document.getElementById('newPinInput').value = '';
  document.getElementById('newPinConfirm').value = '';
  document.getElementById('pinChangeErr').style.display = 'none';
  document.getElementById('pinChangeModal').style.display = 'flex';
}

function closePinChange(){
  document.getElementById('pinChangeModal').style.display = 'none';
}

async function doChangeMasterPin(){
  const current = document.getElementById('currentPinInput').value.trim();
  const next    = document.getElementById('newPinInput').value.trim();
  const confirm = document.getElementById('newPinConfirm').value.trim();
  const errEl   = document.getElementById('pinChangeErr');

  const config = await fsGet('admin', 'config');
  if(!config || config.masterPin !== current){
    errEl.textContent = '현재 PIN이 맞지 않아요'; errEl.style.display='block'; return;
  }
  if(!next){ errEl.textContent = '새 PIN을 입력해주세요'; errEl.style.display='block'; return; }
  if(next !== confirm){ errEl.textContent = '새 PIN이 일치하지 않아요'; errEl.style.display='block'; return; }

  config.masterPin = next;
  config.updatedAt = new Date().toISOString();
  await fsSet('admin', 'config', config);
  closePinChange();
  alert('PIN이 변경됐어요.');
}

async function doLogin(){} // 구버전 호환용 빈 함수

function showErr(show){
  document.getElementById('loginErr').style.display = show ? 'block' : 'none';
}

async function loadDashboard(){
  document.getElementById('trainerList').innerHTML = '<div class="loading">데이터 불러오는 중...</div>';

  const members = await fsGet('data', 'members_'+TRAINER_ID) || [];
  const sentRecords = await fsGet('data', 'sent_'+TRAINER_ID) || {};

  // 회원별 히스토리 로드
  const memberData = await Promise.all(members.map(async m => {
    const hist = await fsGet('data', 'hist_'+TRAINER_ID+'_'+m.id) || [];
    return { ...m, hist };
  }));

  dashData = { members: memberData, sent: sentRecords };
  renderDashboard();
}

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDashboard();
}

function filterEntries(hist){
  if(currentFilter === 'week') return hist.filter(e => isThisWeek(e.dateTime||e.date));
  if(currentFilter === 'month') return hist.filter(e => isThisMonth(e.dateTime||e.date));
  return hist;
}

function intensityColor(v){
  if(v<=40) return '#52b443';
  if(v<=60) return '#f5c842';
  if(v<=75) return '#f5a623';
  if(v<=88) return '#e8703a';
  return '#e8503a';
}

function renderDashboard(){
  const { members, sent } = dashData;

  // 필터 적용된 전체 일지
  let totalJournals = 0, totalSent = 0, totalUnsent = 0;
  let allIntensities = [];

  members.forEach(m => {
    const filtered = filterEntries(m.hist);
    filtered.forEach(e => {
      totalJournals++;
      const key = m.id+'_'+e.id;
      if(sent[key] && sent[key].count > 0) totalSent++;
      else totalUnsent++;
      if(e.intensity) allIntensities.push(e.intensity);
    });
  });

  const avgIntensity = allIntensities.length
    ? Math.round(allIntensities.reduce((a,b)=>a+b,0)/allIntensities.length)
    : 0;

  // 요약 카드
  document.getElementById('summaryGrid').innerHTML = `
    <div class="summary-card good">
      <div class="summary-label">총 일지</div>
      <div class="summary-value">${totalJournals}</div>
      <div class="summary-sub">회원 ${members.length}명</div>
    </div>
    <div class="summary-card good">
      <div class="summary-label">전송 완료</div>
      <div class="summary-value">${totalSent}</div>
      <div class="summary-sub">전송률 ${totalJournals ? Math.round(totalSent/totalJournals*100) : 0}%</div>
    </div>
    <div class="summary-card ${totalUnsent > 0 ? 'alert' : 'good'}">
      <div class="summary-label">미전송</div>
      <div class="summary-value">${totalUnsent}</div>
      <div class="summary-sub">${totalUnsent > 0 ? '확인 필요' : '모두 전송됨'}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">평균 운동 강도</div>
      <div class="summary-value" style="color:${intensityColor(avgIntensity)};">${avgIntensity}<span style="font-size:14px;">점</span></div>
      <div class="summary-sub">/ 100점</div>
    </div>`;

  // 트레이너(여기선 단일 트레이너) 현황
  const listEl = document.getElementById('trainerList');
  listEl.innerHTML = '';

  if(members.length === 0){
    listEl.innerHTML = '<div class="empty">등록된 회원이 없어요</div>';
    return;
  }

  // 회원별 카드
  members.forEach(m => {
    const filtered = filterEntries(m.hist);
    if(currentFilter === 'unsent' && filtered.every(e => {
      const key = m.id+'_'+e.id;
      return sent[key] && sent[key].count > 0;
    })) return;

    const sentCount = filtered.filter(e => {
      const key = m.id+'_'+e.id;
      return sent[key] && sent[key].count > 0;
    }).length;
    const unsentCount = filtered.length - sentCount;
    const avgI = filtered.length
      ? Math.round(filtered.filter(e=>e.intensity).reduce((a,e)=>a+e.intensity,0) / (filtered.filter(e=>e.intensity).length||1))
      : 0;

    const card = document.createElement('div');
    card.className = 'trainer-card';
    card.innerHTML = `
      <div class="trainer-header" onclick="toggleBody(this)">
        <div class="trainer-avatar">${m.name[0]}</div>
        <div class="trainer-info">
          <div class="trainer-name">${m.name}</div>
          <div class="trainer-meta">총 ${filtered.length}회 수업${m.totalSessions ? '  /  '+m.totalSessions+'회차 계약' : ''}</div>
        </div>
        <div class="trainer-stats">
          <div class="stat-item">
            <div class="stat-num ok">${sentCount}</div>
            <div class="stat-label">전송</div>
          </div>
          <div class="stat-item">
            <div class="stat-num ${unsentCount>0?'warn':''}">${unsentCount}</div>
            <div class="stat-label">미전송</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" style="color:${intensityColor(avgI)};">${avgI}</div>
            <div class="stat-label">평균강도</div>
          </div>
        </div>
      </div>
      <div class="trainer-body" id="body_${m.id}">
        ${renderMemberRows(m, filtered, sent)}
      </div>`;
    listEl.appendChild(card);
  });
}

let _modalEntry = null;
let _modalMember = null;

function renderMemberRows(m, filtered, sent){
  if(filtered.length === 0) return '<div class="empty" style="padding:16px;">수업 기록이 없어요</div>';

  // 전역 저장소에 데이터 보관
  if(!window._entryStore) window._entryStore = {};
  filtered.forEach(e => {
    window._entryStore[m.id+'__'+e.id] = { e, mName: m.name };
  });

  return [...filtered].reverse().map(e => {
    const key = m.id+'_'+e.id;
    const storeKey = m.id+'__'+e.id;
    const sentInfo = sent[key];
    const isSent = sentInfo && sentInfo.count > 0;
    const sentLabel = isSent
      ? `<span class="sent-badge sent">✓ 전송</span><span class="sent-count">${sentInfo.count > 1 ? sentInfo.count+'회' : ''}</span>`
      : `<span class="sent-badge unsent">미전송</span>`;
    const intensityV = e.intensity||0;
    const intensityBar = `<span class="intensity-bar"><span class="intensity-fill" style="width:${intensityV}%;background:${intensityColor(intensityV)};"></span></span>`;
    const parts = (e.parts||[]).join(' · ');
    return `<div class="member-row" style="cursor:pointer;" onclick="openJournalModal('${storeKey}')">
      <div class="member-name-col">${e.session||e.streak||'?'}회차</div>
      <div class="member-date">${e.date||''}${parts?' · '+parts:''}</div>
      <div style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--t2);">
        ${intensityV}점${intensityBar}
      </div>
      <div style="display:flex;align-items:center;gap:6px;">${sentLabel}<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
    </div>`;
  }).join('');
}

function openJournalModal(storeKey){
  const stored = window._entryStore && window._entryStore[storeKey];
  if(!stored) return;
  const { e, mName } = stored;
  const session = e.session||e.streak||'?';
  const parts = (e.parts||[]).join(' · ');

  document.getElementById('modalTitle').textContent = `${mName} · ${session}회차  ${e.date||''}`;

  const grandVol = (e.exercises||[]).filter(ex=>{
    const sets=ex.sets||[];return sets.length>0&&!sets.every(s=>Number(s.w)===0);
  }).reduce((s,ex)=>s+(ex.vol||0),0);
  const grandMaxW = (e.exercises||[]).reduce((m,ex)=>Math.max(m,ex.maxW||0),0);

  let html = '';

  // 부위 + 강도 요약
  html += `<div class="detail-section"><div class="detail-stats-row">
    ${parts ? `<div class="detail-stat"><div class="detail-stat-num">${parts}</div><div class="detail-stat-label">운동 부위</div></div>` : ''}
    ${grandMaxW ? `<div class="detail-stat"><div class="detail-stat-num">${grandMaxW}kg</div><div class="detail-stat-label">최고 무게</div></div>` : ''}
    ${grandVol ? `<div class="detail-stat"><div class="detail-stat-num">${grandVol.toLocaleString()}kg</div><div class="detail-stat-label">총 볼륨</div></div>` : ''}
    <div class="detail-stat"><div class="detail-stat-num" style="color:${intensityColor(e.intensity||0)};">${e.intensity||'—'}점</div><div class="detail-stat-label">운동 강도</div></div>
  </div></div>`;

  // 종목별
  if(e.exercises && e.exercises.length){
    html += `<div class="detail-section"><div class="detail-eyebrow">운동 종목</div>`;
    e.exercises.forEach(ex => {
      html += `<div class="detail-ex-card">
        <div class="detail-ex-name">${ex.name||'종목'}</div>`;
      (ex.sets||[]).forEach((st,si) => {
        const vol = st.w * st.r;
        const bw = Number(st.w) === 0;
        html += `<div class="detail-set-row">
          <span class="detail-set-idx">${si+1}세트</span>
          <span class="detail-set-main">${bw ? st.r+'개' : st.w+'kg × '+st.r+'개'}</span>
          ${!bw ? `<span class="detail-set-vol">${vol.toLocaleString()}kg</span>` : ''}
        </div>`;
      });
      if((ex.comment||'').trim()){
        html += `<div class="detail-ex-comment">💬 ${ex.comment.trim().replace(/\n/g,'<br>')}</div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }

  // 편지 — letter 필드 우선, 없으면 구버전 note/next/cheer 합치기
  const letter = e.letter !== undefined
    ? e.letter
    : [e.note, e.next, e.cheer].filter(Boolean).join('\n\n');

  if((letter||'').trim()){
    html += `<div class="detail-section">
      <div class="detail-eyebrow">회원님께 보내는 편지</div>
      <div class="detail-letter">${letter.trim().replace(/\n/g,'<br>')}</div>
    </div>`;
  }

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('journalModal').style.display = 'flex';
}

function closeModal(){
  document.getElementById('journalModal').style.display = 'none';
}

function toggleBody(header){
  const body = header.nextElementSibling;
  body.classList.toggle('open');
}

// 엔터로 로그인
document.getElementById('masterPin').addEventListener('keydown', e => {
  if(e.key === 'Enter') doMasterLogin();
});
</script>
</body>
</html>
