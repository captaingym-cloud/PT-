<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>PT 일지</title>
<style>
:root {
  --g0:#1E4D0A; --g1:#2E7010; --g2:#EAF3DE; --g3:#B2D98A;
  --gold:#C4801A; --gold-l:#FDF3E3; --gold-b:#EAC98A;
  --bg:#F7F7F5; --sf:#FFFFFF; --sf2:#F2F2EF;
  --bd:#E4E4DF; --bd2:#CECECA;
  --t:#1A1A18; --t2:#5A5A55; --t3:#9A9A94;
  --red:#C0392B; --red-l:#FDECEA;
  --r4:4px; --r8:8px; --r12:12px; --r16:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{touch-action:manipulation;-webkit-text-size-adjust:100%;}
html,body{min-height:100%;min-height:-webkit-fill-available;background:var(--bg);font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:var(--t);overscroll-behavior:none;}
input,textarea,button,select{touch-action:manipulation;}

/* SCREENS */
.screen{display:none;min-height:100vh;}
.screen.active{display:block;}

/* SETUP SCREEN */
.setup-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;}
.setup-logo{font-size:40px;margin-bottom:16px;}
.setup-title{font-size:22px;font-weight:700;color:var(--t);margin-bottom:6px;text-align:center;}
.setup-sub{font-size:14px;color:var(--t2);margin-bottom:32px;text-align:center;}
.setup-field{width:100%;max-width:320px;margin-bottom:12px;}
.setup-field label{font-size:11px;color:var(--t3);display:block;margin-bottom:5px;letter-spacing:.04em;}
.setup-field input{width:100%;height:48px;font-size:16px;padding:0 14px;border-radius:var(--r12);border:0.5px solid var(--bd2);background:var(--sf);color:var(--t);outline:none;font-family:inherit;}
.setup-field input:focus{border-color:var(--g1);}
.setup-btn{width:100%;max-width:320px;height:50px;background:var(--g0);border:none;border-radius:var(--r12);font-size:15px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;margin-top:8px;}
.setup-btn:active{background:var(--g1);}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(247,247,245,.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:0.5px solid var(--bd);padding:0 16px;}
.nav-inner{display:flex;align-items:center;gap:8px;padding:11px 0;}
.nav-back{background:none;border:none;cursor:pointer;color:var(--t2);font-size:14px;padding:4px 6px 4px 0;display:flex;align-items:center;gap:3px;font-family:inherit;}
.nav-title{font-size:15px;font-weight:600;color:var(--t);flex:1;}
.nav-trainer{font-size:12px;color:var(--t3);}
.nav-tabs{display:flex;gap:4px;padding:10px 0;}
.nav-tab{flex:1;padding:8px 4px;font-size:13px;font-weight:500;color:var(--t3);background:none;border:none;cursor:pointer;border-radius:var(--r8);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;}
.nav-tab svg{width:14px;height:14px;flex-shrink:0;}
.nav-tab.active{background:var(--g0);color:#fff;}

/* MEMBER LIST SCREEN */
.member-list-wrap{padding:16px;padding-bottom:100px;}
.greeting-card{background:var(--g2);border:0.5px solid var(--g3);border-radius:var(--r16);padding:18px 20px;margin-bottom:16px;}
.greeting-name{font-size:20px;font-weight:700;color:var(--g0);margin-bottom:3px;}
.greeting-sub{font-size:13px;color:var(--g1);}
.section-label{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin:0 0 8px;}
.member-card{background:var(--sf);border:0.5px solid var(--bd);border-radius:var(--r16);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .12s;}
.member-card:active{background:var(--sf2);}
.member-avatar{width:42px;height:42px;border-radius:50%;background:var(--g2);border:0.5px solid var(--g3);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:var(--g0);flex-shrink:0;}
.member-info{flex:1;}
.member-name{font-size:15px;font-weight:600;color:var(--t);margin-bottom:2px;}
.member-meta{font-size:12px;color:var(--t3);}
.member-arrow{color:var(--t3);font-size:18px;}
.add-member-btn{width:100%;padding:14px;background:var(--sf);border:0.5px dashed var(--bd2);border-radius:var(--r16);font-size:14px;color:var(--t2);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;transition:background .12s;}
.add-member-btn:active{background:var(--sf2);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0 0 20px;}
.modal-box{background:var(--sf);border-radius:20px;padding:20px 20px 12px;width:calc(100% - 32px);max-width:420px;}
.modal-title{font-size:16px;font-weight:700;color:var(--t);margin-bottom:14px;}
.modal-field{margin-bottom:12px;}
.modal-field label{font-size:11px;color:var(--t3);display:block;margin-bottom:4px;}
.modal-field input{width:100%;height:44px;font-size:16px;padding:0 12px;border-radius:var(--r8);border:0.5px solid var(--bd2);background:var(--sf2);color:var(--t);outline:none;font-family:inherit;}
.modal-field input:focus{border-color:var(--g1);background:var(--sf);}
.modal-btns{display:flex;gap:8px;margin-top:4px;}
.modal-btn{flex:1;height:46px;border:none;border-radius:var(--r12);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.modal-btn.cancel{background:var(--sf2);color:var(--t2);}
.modal-btn.confirm{background:var(--g0);color:#fff;}
.modal-btn:active{opacity:.8;}

/* JOURNAL LIST SCREEN */
.journal-list-wrap{padding:16px;padding-bottom:100px;}
.new-journal-btn{width:100%;padding:15px 16px;background:var(--g0);border:none;border-radius:var(--r16);font-size:15px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;box-shadow:0 4px 14px rgba(30,77,10,.25);}
.new-journal-btn:active{background:var(--g1);}
.journal-entry-card{background:var(--sf);border:0.5px solid var(--bd);border-radius:var(--r16);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:background .12s;position:relative;}
.journal-entry-card:active{background:var(--sf2);}
.je-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.je-date-block{background:var(--g2);border:0.5px solid var(--g3);border-radius:var(--r8);padding:6px 10px;text-align:center;flex-shrink:0;min-width:46px;}
.je-month{font-size:10px;color:var(--g1);font-weight:500;}
.je-day{font-size:20px;font-weight:700;color:var(--g0);line-height:1.1;}
.je-meta{flex:1;}
.je-session{font-size:12px;color:var(--t3);margin-bottom:3px;}
.je-parts{display:flex;flex-wrap:wrap;gap:4px;}
.je-part-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--g2);color:var(--g0);border:0.5px solid var(--g3);}
.je-exs{font-size:13px;color:var(--t);line-height:1.7;margin-bottom:8px;}
.je-stats{display:flex;gap:14px;font-size:12px;color:var(--t2);}
.je-stats strong{color:var(--t);font-weight:600;}
.je-note{font-size:12px;color:var(--t3);margin-top:8px;padding-top:8px;border-top:0.5px solid var(--bd);line-height:1.6;}
.je-del-btn{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:50%;background:var(--sf2);border:0.5px solid var(--bd);color:var(--t3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.je-del-btn:active{background:var(--red-l);color:var(--red);}

/* DETAIL MODAL */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
.detail-box{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:420px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.detail-handle{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:12px auto 0;}
.detail-nav{display:flex;align-items:center;padding:12px 16px 10px;border-bottom:0.5px solid var(--bd);}
.detail-title{flex:1;font-size:16px;font-weight:700;color:var(--t);}
.detail-close{width:30px;height:30px;border-radius:50%;background:var(--sf2);border:none;font-size:18px;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.detail-scroll{overflow-y:auto;padding:14px 16px 32px;-webkit-overflow-scrolling:touch;}
.detail-section{margin-bottom:14px;}
.detail-eyebrow{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px;}
.detail-card{background:var(--sf);border:0.5px solid var(--bd);border-radius:var(--r12);overflow:hidden;}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:0.5px solid var(--bd);}
.detail-row:last-child{border-bottom:none;}
.detail-row-label{font-size:13px;color:var(--t2);}
.detail-row-val{font-size:13px;font-weight:600;color:var(--t);text-align:right;}
.detail-set-row{display:flex;align-items:center;padding:8px 14px;border-bottom:0.5px solid var(--bd);gap:8px;}
.detail-set-row:last-child{border-bottom:none;}
.detail-set-idx{font-size:11px;color:var(--t3);width:22px;}
.detail-set-main{flex:1;font-size:13px;color:var(--t);}
.detail-set-vol{font-size:12px;color:var(--t3);}
.detail-ex-header{padding:10px 14px 6px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.detail-ex-name{font-size:14px;font-weight:600;color:var(--t);}
.detail-ex-chip{font-size:11px;color:var(--t3);}
.detail-text-card{background:var(--sf);border:0.5px solid var(--bd);border-radius:var(--r12);padding:12px 14px;font-size:13px;color:var(--t2);line-height:1.7;}
.detail-next-item{display:flex;gap:8px;padding:3px 0;font-size:13px;color:var(--t2);}
.detail-next-num{color:var(--t3);flex-shrink:0;}
.detail-cheer{background:var(--g2);border:0.5px solid var(--g3);border-radius:var(--r12);padding:14px;text-align:center;font-size:14px;font-weight:500;color:var(--g0);}
.detail-copy-btn{width:100%;padding:13px;background:var(--g0);border:none;border-radius:var(--r12);font-size:14px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:6px;}
.detail-copy-btn:active{background:var(--g1);}

/* JOURNAL SCREEN */
.page{display:none;padding:16px;padding-bottom:100px;}
.page.active{display:block;}

/* COMMON CARD */
.card{background:var(--sf);border:0.5px solid var(--bd);border-radius:var(--r16);overflow:hidden;margin-bottom:10px;}
.card-section{padding:12px 14px;}
.card-section+.card-section{border-top:0.5px solid var(--bd);}
.card-section label{font-size:10px;color:var(--t3);letter-spacing:.04em;display:block;margin-bottom:5px;}
.eyebrow{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin:16px 0 8px;}

/* INPUTS */
input,textarea{font-size:16px;padding:0 10px;height:38px;border-radius:var(--r8);border:0.5px solid var(--bd2);background:var(--sf2);color:var(--t);outline:none;font-family:inherit;transition:border-color .15s,background .15s;width:100%;}
input:focus,textarea:focus{border-color:var(--g1);background:var(--sf);}
textarea{height:auto;resize:none;padding:8px 10px;line-height:1.6;}

/* MEMBER INFO ROW */
.member-row{display:flex;gap:8px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:10px;color:var(--t3);}
.field.flex{flex:1;}
.field.w80 input{width:72px;}
.field.w58 input{width:58px;}

/* STREAK */
.streak-strip{display:flex;align-items:center;gap:6px;background:var(--g2);border:0.5px solid var(--g3);border-radius:var(--r12);padding:10px 14px;margin-bottom:10px;}
.streak-dots{display:flex;gap:4px;}
.sdot{width:10px;height:10px;border-radius:50%;background:var(--g1);transition:background .2s;}
.sdot.empty{background:var(--g3);}
.streak-text{font-size:12px;color:var(--g0);font-weight:500;flex:1;}
.streak-inp{width:42px;height:28px;text-align:center;font-size:16px;border-radius:6px;border:0.5px solid var(--g3);background:#fff;color:var(--g0);outline:none;font-family:inherit;padding:0;}

/* LIVE BAR */
.live-bar{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;}
.live-card{background:var(--sf);border:0.5px solid var(--bd);border-radius:var(--r12);padding:12px 14px;}
.live-label{font-size:10px;color:var(--t3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px;}
.live-val{font-size:22px;font-weight:600;color:var(--t);line-height:1;}
.live-val span{font-size:12px;font-weight:400;color:var(--t3);margin-left:2px;}
.live-delta{font-size:11px;margin-top:4px;}
.d-up{color:var(--g1);}.d-dn{color:var(--red);}.d-eq{color:var(--t3);}

/* PARTS */
.parts-row{display:flex;flex-wrap:wrap;gap:5px;}
.part-chip{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--bd2);background:var(--sf2);color:var(--t2);cursor:pointer;transition:all .12s;white-space:nowrap;user-select:none;}
.part-chip.sel{background:var(--g2);color:var(--g0);border-color:var(--g3);font-weight:500;}

/* EXERCISE CARD */
.ex-card{background:var(--sf);border:0.5px solid var(--bd);border-radius:var(--r16);margin-bottom:10px;overflow:hidden;}
.ex-header{display:flex;align-items:center;gap:8px;padding:12px 14px 10px;border-bottom:0.5px solid var(--bd);}
.ex-name-inp{flex:1;font-size:15px;font-weight:600;border:none;background:transparent;color:var(--t);outline:none;font-family:inherit;height:auto;padding:0;width:auto;}
.ex-name-inp::placeholder{color:var(--t3);font-weight:400;}
.ex-del-btn{width:26px;height:26px;border-radius:50%;background:var(--sf2);border:0.5px solid var(--bd);color:var(--t3);font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ex-del-btn:active{background:var(--red-l);color:var(--red);}
.prev-row{display:flex;gap:8px;padding:10px 14px;border-bottom:0.5px solid var(--bd);}
.prev-inp-wrap{flex:1;}
.prev-inp-wrap label{font-size:10px;color:var(--t3);display:block;margin-bottom:3px;}
.prev-inp-wrap input{height:32px;font-size:16px;padding:0 8px;}
.prev-auto{font-size:10px;color:var(--g1);margin-top:3px;}
.sets-area{padding:0 14px;}
.sets-header{display:grid;grid-template-columns:26px 1fr 1fr 1fr 26px;gap:5px;align-items:center;padding:7px 0 4px;border-bottom:0.5px solid var(--bd);}
.sets-header span{font-size:10px;color:var(--t3);letter-spacing:.03em;text-align:center;}
.sets-header .th-r{text-align:right;}
.set-row{display:grid;grid-template-columns:26px 1fr 1fr 1fr 26px;gap:5px;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--bd);}
.set-row:last-of-type{border-bottom:none;}
.set-idx{font-size:11px;color:var(--t3);text-align:center;}
.set-vol{font-size:12px;color:var(--t3);text-align:right;}
.set-del{width:24px;height:24px;border-radius:50%;background:none;border:none;color:var(--t3);font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.set-del:active{color:var(--red);}

/* DIAL */
.dial-wrap{display:flex;flex-direction:column;align-items:center;position:relative;user-select:none;-webkit-user-select:none;}
.dial-display{
  width:100%;height:48px;
  border-radius:var(--r8);
  border:0.5px solid var(--bd);
  background:var(--sf2);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:600;color:var(--t);
  cursor:ns-resize;
  position:relative;overflow:hidden;
  transition:border-color .12s, background .12s;
  touch-action:none;
}
.dial-display.active{border-color:var(--g1);background:var(--sf);}
.dial-display.empty{color:var(--t3);font-size:13px;font-weight:400;}
.dial-arrows{position:absolute;right:5px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:1px;opacity:.35;}
.dial-arrows span{font-size:9px;line-height:1;color:var(--t2);}
.dial-unit{font-size:10px;color:var(--t3);font-weight:400;margin-left:2px;}
.ex-footer{display:flex;align-items:center;gap:8px;padding:10px 14px 12px;border-top:0.5px solid var(--bd);}
.ex-sets-summary{padding:6px 14px 8px;display:flex;flex-wrap:wrap;gap:4px;}
.ex-set-chip{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--sf2);border:0.5px solid var(--bd);color:var(--t2);white-space:nowrap;}
.ex-set-chip.filled{background:var(--g2);border-color:var(--g3);color:var(--g0);}
.ex-summary{flex:1;font-size:12px;color:var(--t2);}
.ex-summary strong{color:var(--t);font-weight:600;}
.pr-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--gold-l);color:var(--gold);border:0.5px solid var(--gold-b);display:none;white-space:nowrap;}
.add-set-btn{background:none;border:0.5px dashed var(--bd2);border-radius:var(--r8);padding:5px 12px;font-size:12px;color:var(--t2);cursor:pointer;white-space:nowrap;font-family:inherit;}
.add-set-btn:active{background:var(--sf2);}
.add-ex-btn{width:100%;padding:12px;background:var(--sf);border:0.5px dashed var(--bd2);border-radius:var(--r16);font-size:13px;color:var(--t2);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:14px;transition:background .12s;}
.add-ex-btn:active{background:var(--sf2);}

/* INTENSITY */
.intensity-card{background:var(--sf);border:0.5px solid var(--bd);border-radius:var(--r16);padding:14px 16px 12px;margin-bottom:10px;}
.intensity-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.intensity-title{font-size:13px;font-weight:600;color:var(--t);}
.intensity-score-wrap{display:flex;align-items:baseline;gap:2px;}
.intensity-score{font-size:30px;font-weight:700;line-height:1;transition:color .2s;}
.intensity-score-unit{font-size:13px;color:var(--t3);}
.intensity-track{position:relative;height:40px;display:flex;align-items:center;margin-bottom:4px;}
.intensity-bg{position:absolute;left:0;right:0;height:8px;border-radius:4px;background:linear-gradient(to right,#52b443 0%,#f5c842 55%,#e8503a 100%);opacity:.22;}
.intensity-fill{position:absolute;left:0;height:8px;border-radius:4px;background:linear-gradient(to right,#52b443 0%,#f5c842 55%,#e8503a 100%);transition:width .12s;pointer-events:none;}
input[type=range]#iIntensity{position:relative;width:100%;height:40px;-webkit-appearance:none;appearance:none;background:transparent;border:none;padding:0;cursor:pointer;z-index:1;}
input[type=range]#iIntensity::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:#fff;border:2.5px solid #888;box-shadow:0 2px 6px rgba(0,0,0,.18);}
input[type=range]#iIntensity::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:#fff;border:2.5px solid #888;box-shadow:0 2px 6px rgba(0,0,0,.18);}
input[type=range]#iIntensity::-webkit-slider-runnable-track{background:transparent;}
input[type=range]#iIntensity::-moz-range-track{background:transparent;}
.intensity-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);padding:0 2px;margin-bottom:6px;}
.intensity-desc{text-align:center;font-size:13px;font-weight:500;padding:6px 0 2px;transition:color .2s;}

/* HISTORY */
.history-item{background:var(--sf);border:0.5px solid var(--bd);border-radius:var(--r16);padding:14px 16px;margin-bottom:8px;}
.history-date{font-size:12px;color:var(--t3);margin-bottom:6px;}
.history-parts{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.history-part-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--g2);color:var(--g0);border:0.5px solid var(--g3);}
.history-exs{font-size:13px;color:var(--t);margin-bottom:8px;line-height:1.7;}
.history-stats{display:flex;gap:12px;font-size:12px;color:var(--t2);}
.history-stats span strong{color:var(--t);font-weight:600;}
.history-note{font-size:12px;color:var(--t3);margin-top:8px;padding-top:8px;border-top:0.5px solid var(--bd);line-height:1.6;}
.empty-state{text-align:center;padding:48px 24px;color:var(--t3);}
.empty-state .e-icon{font-size:36px;margin-bottom:12px;}
.empty-state .e-text{font-size:14px;}

/* SAVE + COPY BTNs */
.bottom-btns{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;padding:10px 16px;background:rgba(247,247,245,.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:0.5px solid var(--bd);display:flex;gap:8px;z-index:50;}
.btn-save{flex:1;padding:13px;background:var(--sf);border:0.5px solid var(--bd2);border-radius:var(--r12);font-size:14px;font-weight:600;color:var(--t);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-save:active{background:var(--sf2);}
.btn-copy{flex:2;padding:13px;background:var(--g0);border:none;border-radius:var(--r12);font-size:14px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 4px 14px rgba(30,77,10,.25);}
.btn-copy:active{background:var(--g1);}
.btn-copy.done{background:var(--g1);}

/* PREVIEW */
.preview-wrap{background:var(--sf);border:0.5px solid var(--bd);border-radius:var(--r16);padding:18px;margin-bottom:90px;}
.preview-text{font-size:13px;line-height:1.95;white-space:pre-wrap;color:var(--t);font-family:'Courier New','Malgun Gothic',monospace;}

@supports (padding-bottom:env(safe-area-inset-bottom)){
  .bottom-btns{padding-bottom:calc(10px + env(safe-area-inset-bottom));}
  .page,.member-list-wrap{padding-bottom:calc(100px + env(safe-area-inset-bottom));}
}
</style>
</head>
<body>

<div class="screen" id="screen-journal">

<script>
/* iOS PWA 더블탭 확대 차단 — input 터치 가로채기 방지 */
(function(){
  var lastTap = 0;
  document.addEventListener('touchend', function(e){
    var now = Date.now();
    var tag = e.target.tagName;
    // input/textarea/button은 더블탭 차단 안 함 (키보드 올라와야 함)
    if(tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'BUTTON' || tag === 'SELECT') return;
    if(now - lastTap < 300) e.preventDefault();
    lastTap = now;
  }, {passive: false});
})();

/* ═══════════════════════════════════════
   STORAGE
═══════════════════════════════════════ */
const DB = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch{ return null; } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
  del: k => localStorage.removeItem(k),
};

function getTrainer(){ return DB.get('trainer') || null; }
function saveTrainer(name){ DB.set('trainer', name); }
function getMembers(){ return DB.get('members') || []; }
function saveMembers(arr){ DB.set('members', arr); }
function getMemberHistory(mid){ return DB.get('hist_'+mid) || []; }
function saveMemberHistory(mid, arr){ DB.set('hist_'+mid, arr); }

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let currentMember = null; // {id, name}
let exercises = [];
let selectedParts = [];

const PARTS_LIST = ['가슴','등','어깨','하체','팔','코어','전신','유산소','재활'];
const INTENSITY_LEVELS = [
  {max:20, color:'#52b443', desc:'😌  아주 가볍게 움직였어요'},
  {max:40, color:'#7ec843', desc:'🙂  워밍업 같은 수준이에요'},
  {max:60, color:'#f5c842', desc:'😤  적당히 땀 흘렸어요'},
  {max:75, color:'#f5a623', desc:'💪  꽤 열심히 했어요'},
  {max:88, color:'#e8703a', desc:'🔥  많이 힘들었어요'},
  {max:100,color:'#e8503a', desc:'🥵  한계까지 밀어붙였어요'},
];

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
(function init(){
  const trainer = getTrainer();
  if (trainer) {
    showScreen('screen-members');
    renderMemberList();
  } else {
    showScreen('screen-setup');
  }
})();

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ═══════════════════════════════════════
   SETUP
═══════════════════════════════════════ */
function doSetup(){
  const name = document.getElementById('setupName').value.trim();
  if (!name) { document.getElementById('setupName').focus(); return; }
  saveTrainer(name);
  showScreen('screen-members');
  renderMemberList();
}

/* ═══════════════════════════════════════
   MEMBER LIST
═══════════════════════════════════════ */
function renderMemberList(){
  const trainer = getTrainer();
  const members = getMembers();
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];

  document.getElementById('greetingName').textContent = trainer + ' 트레이너님 👋';
  document.getElementById('greetingMeta').textContent =
    `${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일  ·  회원 ${members.length}명`;
  document.getElementById('trainerBadge').textContent = trainer;

  const container = document.getElementById('memberCards');
  container.innerHTML = '';
  if (members.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="e-icon">👤</div><div class="e-text">아직 등록된 회원이 없어요</div></div>`;
    return;
  }
  members.forEach(m => {
    const hist = getMemberHistory(m.id);
    const last = hist.length ? hist[hist.length-1] : null;
    const lastDate = last ? last.date : '기록 없음';
    const card = document.createElement('div');
    card.className = 'member-card';
    card.innerHTML = `
      <div class="member-avatar">${m.name[0]}</div>
      <div class="member-info">
        <div class="member-name">${m.name}</div>
        <div class="member-meta">마지막 수업 ${lastDate}  ·  총 ${hist.length}회</div>
      </div>
      <span class="member-arrow">›</span>`;
    card.onclick = () => openMemberJournals(m);
    container.appendChild(card);
  });
}

/* 회원별 일지 목록 화면 */
function openMemberJournals(member){
  currentMember = member;
  document.getElementById('journalsTitle').textContent = member.name + '님';
  renderJournalList();
  showScreen('screen-journals');
}

function goToMembers(){
  showScreen('screen-members');
  renderMemberList();
}

function renderJournalList(){
  if(!currentMember) return;
  const hist = getMemberHistory(currentMember.id);
  const label = document.getElementById('journalsCountLabel');
  const container = document.getElementById('journalEntries');

  label.textContent = '일지  ' + hist.length + '개';
  container.innerHTML = '';

  if(hist.length === 0){
    container.innerHTML = '<div class="empty-state"><div class="e-icon">📋</div><div class="e-text">아직 작성된 일지가 없어요<br>새 일지를 작성해보세요</div></div>';
    return;
  }

  const iColor = v => {
    if(v<=20) return '#52b443'; if(v<=40) return '#7ec843';
    if(v<=60) return '#f5c842'; if(v<=75) return '#f5a623';
    if(v<=88) return '#e8703a'; return '#e8503a';
  };

  [...hist].reverse().forEach((e, ri) => {
    const realIdx = hist.length - 1 - ri;
    const d = new Date(e.dateTime || e.date);
    const month = isNaN(d) ? '' : (d.getMonth()+1)+'월';
    const day   = isNaN(d) ? e.date : d.getDate();
    const dow   = isNaN(d) ? '' : ['일','월','화','수','목','금','토'][d.getDay()];

    const grandVol  = (e.exercises||[]).reduce((s,ex)=>s+ex.vol,0);
    const grandMaxW = (e.exercises||[]).reduce((m,ex)=>Math.max(m,ex.maxW||0),0);
    const partTags  = (e.parts||[]).map(p=>'<span class="je-part-tag">'+p+'</span>').join('');

    // 종목별 세트 전체 표시
    const exBlock = (e.exercises||[]).map(ex => {
      const setStr = (ex.sets||[]).map(st => st.w+'kg × '+st.r+'개').join(',  ');
      return '<div style="margin-bottom:6px;">'
        +'<span style="font-size:13px;font-weight:600;color:var(--t);">'+ex.name+'</span>'
        +'<div style="font-size:12px;color:var(--t2);margin-top:2px;line-height:1.7;">'+setStr+'</div>'
        +'</div>';
    }).join('');

    const card = document.createElement('div');
    card.className = 'journal-entry-card';
    card.innerHTML =
      '<button class="je-del-btn" onclick="event.stopPropagation();deleteEntry('+realIdx+')" aria-label="삭제">×</button>'
      +'<div class="je-header">'
        +'<div class="je-date-block">'
          +'<div class="je-month">'+month+'</div>'
          +'<div class="je-day">'+day+'</div>'

/* ═══════════════════════════════════════
   CALC
═══════════════════════════════════════ */
function exVol(ex){return ex.sets.reduce((s,st)=>s+st.w*st.r,0);}
function exMaxW(ex){return ex.sets.length?Math.max(...ex.sets.map(st=>st.w)):0;}

function recalcAll(){
  // 지난 기록에서 prev 자동 반영
  const hist = currentMember ? getMemberHistory(currentMember.id) : [];
  const lastEntry = hist.length ? hist[hist.length-1] : null;

  const grandVol = exercises.reduce((s,ex)=>s+exVol(ex),0);
  const grandPrev = exercises.reduce((s,ex)=>s+(ex.prevVol||0),0);
  const bw = (lastEntry && lastEntry.bw) ? lastEntry.bw : 70;
  const totalSets = exercises.reduce((s,ex)=>s+ex.sets.length,0);
  const cal = Math.round(bw*0.088*totalSets*2.5);

  document.getElementById('sumVol').innerHTML=grandVol.toLocaleString()+'<span>kg</span>';
  document.getElementById('sumCal').innerHTML=cal.toLocaleString()+'<span>kcal</span>';

  if(grandPrev>0){
    const diff=grandVol-grandPrev;
    const pct=Math.round((diff/grandPrev)*100);
    const cl=diff>0?'d-up':diff<0?'d-dn':'d-eq';
    const arrow=diff>0?'↑':diff<0?'↓':'→';
    document.getElementById('sumDelta').innerHTML=
      `<span class="${cl}">${arrow} ${diff>=0?'+':''}${diff.toLocaleString()}kg (${diff>=0?'+':''}${pct}%)</span>`;
  } else {
    document.getElementById('sumDelta').innerHTML='';
  }
  exercises.forEach((_,ei)=>updateExFooter(ei));
}

function updateExFooter(ei){
  const ex=exercises[ei];
  if(!ex) return;
  const vol=exVol(ex),mw=exMaxW(ex);
  const chip=document.getElementById('chip-'+ei);
  const badge=document.getElementById('badge-'+ei);
  const setsum=document.getElementById('setsum-'+ei);

  if(chip) chip.innerHTML=`볼륨 <strong>${vol.toLocaleString()}kg</strong>　최고 <strong>${mw}kg</strong>`;
  if(badge) badge.style.display=(ex.prevMaxW>0&&mw>ex.prevMaxW)?'inline-block':'none';

  // 세트 요약 칩
  if(setsum){
    if(ex.sets.length===0){
      setsum.innerHTML='';
    } else {
      setsum.innerHTML=ex.sets.map((st,si)=>{
        const filled=st.w>0&&st.r>0;
        const label=filled?`${st.w}kg×${st.r}`:`S${si+1}`;
        return `<span class="ex-set-chip${filled?' filled':''}">${label}</span>`;
      }).join('');
    }
  }

  ex.sets.forEach((_,si)=>{
    const el=document.getElementById(`rv-${ei}-${si}`);
    if(el) el.textContent=(ex.sets[si].w&&ex.sets[si].r)?(ex.sets[si].w*ex.sets[si].r).toLocaleString()+'kg':'';
  });
}

function buildSetRows(ei){
  const c=document.getElementById('sets-'+ei);
  if(!c) return;
  c.innerHTML='';

  c.appendChild(hdr);

    const row=document.createElement('div');

      <span class="set-idx">${si+1}</span>
      <div class="dial-wrap">
        <div class="dial-display${s.w?'':' empty'}" id="${wId}" data-ei="${ei}" data-si="${si}" data-type="w">
          ${s.w?s.w+'<span class="dial-unit">kg</span>':'kg'}
          <div class="dial-arrows"><span>▲</span><span>▼</span></div>
        </div>
      </div>
      <div class="dial-wrap">
        <div class="dial-display${s.r?'':' empty'}" id="${rId}" data-ei="${ei}" data-si="${si}" data-type="r">
          ${s.r?s.r+'<span class="dial-unit">개</span>':'개수'}
          <div class="dial-arrows"><span>▲</span><span>▼</span></div>
        </div>
      </div>
      <span class="set-vol" id="rv-${ei}-${si}">${s.w&&s.r?(s.w*s.r).toLocaleString()+'kg':''}</span>
      <button class="set-del" onclick="removeSet(${ei},${si})">×</button>`;
    c.appendChild(row);

    // 다이얼 이벤트 붙이기
    [wId, rId].forEach(id => {
      const el = row.querySelector('#'+id);
      if(el) attachDial(el);
    });
  });
}

/* ── DIAL LOGIC ── */
function attachDial(el){
  const ei   = parseInt(el.dataset.ei);
  const si   = parseInt(el.dataset.si);
  const type = el.dataset.type; // 'w' or 'r'
  const step = type==='w' ? 2.5 : 1;
  const min  = type==='w' ? 0 : 0;
  const max  = type==='w' ? 300 : 100;
  const unit = type==='w' ? 'kg' : '개';

  let startY=0, startVal=0, dragging=false, moved=false;

  function getVal(){ return type==='w' ? (exercises[ei].sets[si].w||0) : (exercises[ei].sets[si].r||0); }
  function setVal(v){
    v = Math.round(v / step) * step;
    v = Math.max(min, Math.min(max, v));
    if(type==='w') exercises[ei].sets[si].w = v;
    else           exercises[ei].sets[si].r = v;
    // 표시 업데이트
    el.innerHTML = v
      ? v+'<span class="dial-unit">'+unit+'</span><div class="dial-arrows"><span>▲</span><span>▼</span></div>'
      : unit+'<div class="dial-arrows"><span>▲</span><span>▼</span></div>';
    el.classList.toggle('empty', !v);
    // 볼륨 업데이트
    const rvEl = document.getElementById('rv-'+ei+'-'+si);
    const w = exercises[ei].sets[si].w;
    const r = exercises[ei].sets[si].r;
    if(rvEl) rvEl.textContent = w&&r ? (w*r).toLocaleString()+'kg' : '';
    recalcAll();
  }

  // 터치
  el.addEventListener('touchstart', e=>{
    startY   = e.touches[0].clientY;
    startVal = getVal();
    dragging = true;
    moved    = false;
    el.classList.add('active');
    e.preventDefault();
  },{passive:false});

  el.addEventListener('touchmove', e=>{
    if(!dragging) return;
    const dy  = startY - e.touches[0].clientY; // 위로 올리면 +
    const sens = type==='w' ? 6 : 8; // px per step
    const delta = Math.round(dy / sens) * step;
    if(Math.abs(dy)>3) moved=true;
    setVal(startVal + delta);
    e.preventDefault();
  },{passive:false});

  el.addEventListener('touchend', e=>{
    el.classList.remove('active');
    dragging=false;
    // 탭(움직임 없음) → 숫자 직접 입력 팝업
    if(!moved) openDialInput(ei, si, type);
    e.preventDefault();
  },{passive:false});

  // 마우스 (PC)
  let mouseActive = false;
  el.addEventListener('mousedown', e=>{
    startY=e.clientY; startVal=getVal(); dragging=true; moved=false; mouseActive=true;
    el.classList.add('active');
    e.preventDefault();

    function onMove(e){
      if(!dragging) return;
      const dy=startY-e.clientY;
      const sens=type==='w'?6:8;
      const delta=Math.round(dy/sens)*step;
      if(Math.abs(dy)>3) moved=true;
      setVal(startVal+delta);
    }
    function onUp(){
      el.classList.remove('active');
      dragging=false;
      mouseActive=false;
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      if(!moved) openDialInput(ei,si,type);
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });
}

// 탭 시 숫자 직접 입력
function openDialInput(ei, si, type){
  const unit = type==='w'?'kg':'개';
  const cur  = type==='w'?exercises[ei].sets[si].w:exercises[ei].sets[si].r;
  const val  = prompt((type==='w'?'무게 (kg)':'횟수 (개)') + ' 직접 입력', cur||'');
  if(val===null) return;
  const num = type==='w' ? parseFloat(val) : parseInt(val);
  if(isNaN(num)) return;
  if(type==='w') exercises[ei].sets[si].w=num;
  else           exercises[ei].sets[si].r=num;
  buildSetRows(ei);
  updateExFooter(ei);
  recalcAll();
}

function addSet(ei){
  const last=exercises[ei].sets.slice(-1)[0];
  exercises[ei].sets.push({w:last?last.w:0,r:last?last.r:10});
  buildSetRows(ei);updateExFooter(ei);recalcAll();
}
function removeSet(ei,si){
  exercises[ei].sets.splice(si,1);
  buildSetRows(ei);updateExFooter(ei);recalcAll();
}

        <div class="prev-inp-wrap">
          <label>지난 최고 무게 kg</label>
          <input type="number" value="${ex.prevMaxW||''}" placeholder="0" id="prevW-${ei}"
            oninput="exercises[${ei}].prevMaxW=parseFloat(this.value)||0;updateExFooter(${ei});"/>
          <div class="prev-auto" id="prevWauto-${ei}"></div>
        </div>
        <div class="prev-inp-wrap">
          <label>지난 볼륨 kg</label>
          <input type="number" value="${ex.prevVol||''}" placeholder="0" id="prevV-${ei}"
            oninput="exercises[${ei}].prevVol=parseInt(this.value)||0;recalcAll();"/>
          <div class="prev-auto" id="prevVauto-${ei}"></div>
        </div>
      </div>
      <div class="sets-area" id="sets-${ei}"></div>
      <div class="ex-sets-summary" id="setsum-${ei}"></div>
      <div class="ex-footer">
        <span class="ex-summary" id="chip-${ei}">볼륨 <strong>0kg</strong></span>
        <span class="pr-badge" id="badge-${ei}">✦ 신기록</span>
        <button class="add-set-btn" onclick="addSet(${ei})">+ 세트</button>
      </div>`;
    container.appendChild(card);
    buildSetRows(ei);
    updateExFooter(ei);
    // 이미 이름 있으면 자동 채우기
    if(ex.name) autoFillPrev(ei, ex.name);
  });
}

function autoFillPrev(ei, name){
  if(!name.trim()) return;
  const prev=getLastExData(name.trim());
  if(!prev) return;
  const wEl=document.getElementById('prevW-'+ei);
  const vEl=document.getElementById('prevV-'+ei);
  const waEl=document.getElementById('prevWauto-'+ei);
  const vaEl=document.getElementById('prevVauto-'+ei);
  if(wEl&&!wEl.value){
    wEl.value=prev.maxW||'';
    exercises[ei].prevMaxW=prev.maxW||0;
    if(waEl) waEl.textContent='✓ 지난 기록에서 자동 입력';
  }
  if(vEl&&!vEl.value){
    vEl.value=prev.vol||'';
    exercises[ei].prevVol=prev.vol||0;
    if(vaEl) vaEl.textContent='✓ 지난 기록에서 자동 입력';
  }
  recalcAll();
}

function addExercise(){
  exercises.push({name:'',prevMaxW:0,prevVol:0,sets:[{w:0,r:10}]});
  renderExCards();recalcAll();
}
function removeExercise(ei){
  exercises.splice(ei,1);renderExCards();recalcAll();
}

/* ═══════════════════════════════════════
   SAVE
═══════════════════════════════════════ */
function saveJournal(){
  if(!currentMember) return;
  const hist=getMemberHistory(currentMember.id);
  const bw=70; // 추후 입력 추가 가능
  const entry={
    id:'e_'+Date.now(),
    date:getShortDate(),
    dateTime:new Date().toISOString(),
    bw,
    parts:[...selectedParts],
    exercises:exercises.map(ex=>({
      name:ex.name,
      maxW:exMaxW(ex),
      vol:exVol(ex),
      sets:[...ex.sets],
    })),
    intensity:parseInt(document.getElementById('iIntensity').value)||70,
    streak:parseInt(document.getElementById('iStreak').value)||1,
    note:document.getElementById('iNote').value.trim(),
    next:document.getElementById('iNext').value.trim(),
    cheer:document.getElementById('iCheer').value.trim(),
  };
  hist.push(entry);
  saveMemberHistory(currentMember.id, hist);

  // 회원 목록 메타도 갱신
  const lbl = document.getElementById('journalsCountLabel');
  if(lbl) lbl.textContent = `일지  ${hist.length}개`;

  // 저장 피드백
  const btn=document.querySelector('.btn-save');
  const orig=btn.innerHTML;
  btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> 저장됨';
  btn.style.color='var(--g1)';
  setTimeout(()=>{btn.innerHTML=orig;btn.style.color='';},2000);
}

/* ═══════════════════════════════════════
   HISTORY
═══════════════════════════════════════ */
function renderHistory(){
  if(!currentMember) return;
  const hist=getMemberHistory(currentMember.id);
  const container=document.getElementById('historyList');
  if(hist.length===0){
    container.innerHTML=`<div class="empty-state"><div class="e-icon">📋</div><div class="e-text">아직 저장된 일지가 없어요</div></div>`;
    return;
  }
  container.innerHTML='';
  [...hist].reverse().forEach(e=>{
    const item=document.createElement('div');
    item.className='history-item';
    const partTags=(e.parts||[]).map(p=>`<span class="history-part-tag">${p}</span>`).join('');
    const exLines=(e.exercises||[]).map(ex=>`${ex.name}  ${ex.vol.toLocaleString()}kg`).join('\n');
    const grandVol=(e.exercises||[]).reduce((s,ex)=>s+ex.vol,0);
    item.innerHTML=`
      <div class="history-date">${e.date}  ·  ${e.streak}회차</div>
      ${partTags?`<div class="history-parts">${partTags}</div>`:''}
      <div class="history-exs" style="white-space:pre-line;">${exLines||'—'}</div>
      <div class="history-stats">
        <span>총 볼륨 <strong>${grandVol.toLocaleString()}kg</strong></span>
        <span>강도 <strong>${e.intensity}점</strong></span>
      </div>
      ${e.note?`<div class="history-note">${e.note}</div>`:''}`;
    container.appendChild(item);
  });
}

/* ═══════════════════════════════════════
   TEXT BUILD
═══════════════════════════════════════ */
function getToday(){
  const d=new Date();
  const days=['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
}
function getShortDate(){
  const d=new Date();
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function buildText(){
  const trainer=getTrainer()||'트레이너';
  const member=currentMember?currentMember.name:'회원';
  const session=document.getElementById('iStreak').value||'1';
  const intensity=parseInt(document.getElementById('iIntensity').value)||70;
  const note=document.getElementById('iNote').value.trim();
  const nextRaw=document.getElementById('iNext').value.trim();
  const cheer=document.getElementById('iCheer').value.trim();

  const grandVol=exercises.reduce((s,ex)=>s+exVol(ex),0);
  const grandPrev=exercises.reduce((s,ex)=>s+(ex.prevVol||0),0);
  const bw=70;
  const totalSets=exercises.reduce((s,ex)=>s+ex.sets.length,0);
  const cal=Math.round(bw*0.088*totalSets*2.5);
  const volDiff=grandVol-grandPrev;
  const volPct=grandPrev?Math.round((volDiff/grandPrev)*100):null;
  const partStr=selectedParts.length?selectedParts.join('  '):'';
  const intensityDesc=intensityLevel(intensity).desc;

  const L=[];
  L.push(`🏋️ ${member} 회원님  ${getToday()}`);
  L.push(`${session}번째 수업${partStr?'  |  '+partStr:''}`);
  L.push('');

  exercises.forEach((ex,ei)=>{
    const vol=exVol(ex),mw=exMaxW(ex);
    const isPR=ex.prevMaxW>0&&mw>ex.prevMaxW;
    const diff=vol-(ex.prevVol||0);
    const pct=ex.prevVol?Math.round((diff/ex.prevVol)*100):null;
    L.push(`📌 ${ex.name||'종목'}${isPR?'  🏅 신기록':''}`);
    ex.sets.forEach((st,si)=>L.push(`   ${si+1}세트  ${st.w}kg × ${st.r}회`));
    L.push('');
    L.push(`   볼륨  ${vol.toLocaleString()}kg${pct!==null?`  (지난 대비 ${diff>=0?'+':''}${pct}%)`:''}` );
    if(ex.prevMaxW) L.push(`   최고 무게  ${mw}kg${mw!==ex.prevMaxW?`  (이전 ${ex.prevMaxW}kg)`:''}`);
    L.push('');
  });

  L.push('──────────────────────');
  L.push(`📊 총 볼륨  ${grandVol.toLocaleString()}kg${volPct!==null?`  (지난 대비 ${volDiff>=0?'+':''}${volPct}%)`:''}` );
  L.push(`🔥 소모 칼로리  약 ${cal.toLocaleString()}kcal`);
  L.push(`💥 운동 강도  ${intensity}점 / 100점   ${intensityDesc}`);
  L.push(`🗓 연속 출석  ${session}회`);

  if(note){
    L.push('');L.push('──────────────────────');
    L.push('💬 오늘 피드백');L.push('');L.push(note);
  }
  const nextLines=nextRaw.split('\n').filter(s=>s.trim());
  if(nextLines.length){
    L.push('');L.push('📋 다음 수업 포인트');
    nextLines.forEach((l,i)=>L.push(`   ${i+1}.  ${l.trim()}`));
  }
  if(cheer){
    L.push('');L.push('──────────────────────');
    L.push('');L.push(cheer);
  }
  L.push('');L.push(`트레이너  ${trainer}`);
  return L.join('\n');
}

function renderPreview(){
  document.getElementById('previewText').textContent=buildText();
}

/* ═══════════════════════════════════════
   COPY (3-tier fallback)
═══════════════════════════════════════ */
function doCopyEntry(idx){
  // 저장된 일지 엔트리를 텍스트로 복사
  const hist = getMemberHistory(currentMember.id);
  const e = hist[idx];
  if(!e) return;
  const trainer = getTrainer()||'트레이너';
  const d = new Date(e.dateTime||e.date);
  const days=['일','월','화','수','목','금','토'];
  const dateStr = isNaN(d) ? e.date : (d.getMonth()+1)+'월 '+d.getDate()+'일 '+days[d.getDay()]+'요일';
  const iDesc = v=>{if(v<=20)return '아주 가볍게';if(v<=40)return '워밍업 수준';if(v<=60)return '적당히 땀 흘림';if(v<=75)return '꽤 열심히';if(v<=88)return '많이 힘들었음';return '한계까지';};
  const iv=e.intensity||70;
  const grandVol=(e.exercises||[]).reduce((s,ex)=>s+ex.vol,0);
  const grandPrev=(e.exercises||[]).reduce((s,ex)=>s+(ex.prevVol||0),0);
  const volDiff=grandVol-grandPrev;
  const volPct=grandPrev?Math.round((volDiff/grandPrev)*100):null;
  const partStr=(e.parts||[]).join('  ');
  const L=[];
  L.push('🏋️ '+currentMember.name+' 회원님  '+dateStr);
  L.push(e.streak+'번째 수업'+(partStr?'  |  '+partStr:''));L.push('');
  (e.exercises||[]).forEach(ex=>{
    const diff=ex.vol-(ex.prevVol||0);
    const pct=ex.prevVol?Math.round((diff/ex.prevVol)*100):null;
    const isPR=ex.prevMaxW>0&&ex.maxW>ex.prevMaxW;
    L.push('📌 '+ex.name+(isPR?'  🏅 신기록':''));
    (ex.sets||[]).forEach((st,si)=>L.push('   '+(si+1)+'세트  '+st.w+'kg × '+st.r+'회'));
    L.push('');
    L.push('   볼륨  '+ex.vol.toLocaleString()+'kg'+(pct!==null?'  (지난 대비 '+(diff>=0?'+':'')+pct+'%)':''));
    if(ex.prevMaxW) L.push('   최고 무게  '+ex.maxW+'kg'+(ex.maxW!==ex.prevMaxW?'  (이전 '+ex.prevMaxW+'kg)':''));
    L.push('');
  });
  L.push('──────────────────────');
  L.push('📊 총 볼륨  '+grandVol.toLocaleString()+'kg'+(volPct!==null?'  (지난 대비 '+(volDiff>=0?'+':'')+volPct+'%)':''));
  L.push('💥 운동 강도  '+iv+'점 / 100점   '+iDesc(iv));
  L.push('🗓 연속 출석  '+e.streak+'회');
  if(e.note){L.push('');L.push('──────────────────────');L.push('💬 오늘 피드백');L.push('');L.push(e.note);}
  const nextLines=(e.next||'').split('\n').filter(s=>s.trim());
  if(nextLines.length){L.push('');L.push('📋 다음 수업 포인트');nextLines.forEach((l,i)=>L.push('   '+(i+1)+'.  '+l.trim()));}
  if(e.cheer){L.push('');L.push('──────────────────────');L.push('');L.push(e.cheer);}
  L.push('');L.push('트레이너  '+trainer);
  const text=L.join('\n');
  const btn=document.querySelector('.detail-copy-btn');
  function markDone(){
    if(btn){btn.textContent='✓ 복사 완료';setTimeout(()=>{btn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4 20-7z"/></svg> 이 일지 복사하기';},2000);}
  }
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(markDone).catch(()=>showModal(text));}
  else{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;top:0;left:0;width:2em;height:2em;opacity:0;';document.body.appendChild(ta);ta.focus();ta.select();try{if(document.execCommand('copy'))markDone();else showModal(text);}catch(e){showModal(text);}document.body.removeChild(ta);}
}

function doCopy(){
  const text=buildText();
  const btn=document.getElementById('copyBtn');
  function markDone(){
    btn.classList.add('done');
    btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> 복사 완료';
    setTimeout(()=>{btn.classList.remove('done');btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4 20-7z"/></svg> 일지 복사하기';},2000);
  }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(markDone).catch(fallback);
  } else { fallback(); }
  function fallback(){
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.cssText='position:fixed;top:0;left:0;width:2em;height:2em;opacity:0;';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{ if(document.execCommand('copy')) markDone(); else showModal(text); }
    catch(e){ showModal(text); }
    document.body.removeChild(ta);
  }
}
function showModal(text){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:flex-end;justify-content:center;padding:0 0 20px;';
  const box=document.createElement('div');
  box.style.cssText='background:#fff;border-radius:16px;padding:16px;width:calc(100% - 32px);max-width:420px;max-height:70vh;display:flex;flex-direction:column;gap:10px;';
  box.innerHTML=`<div style="font-size:13px;font-weight:600;color:#1A1A18;">전체 선택 후 복사하세요</div>
    <textarea readonly style="flex:1;min-height:220px;font-size:12px;line-height:1.8;border:0.5px solid #E4E4DF;border-radius:8px;padding:10px;resize:none;font-family:'Courier New',monospace;color:#1A1A18;background:#F7F7F5;">${text}</textarea>
    <button onclick="this.closest('div').parentElement.remove()" style="padding:12px;background:#1E4D0A;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">닫기</button>`;
  ov.appendChild(box);document.body.appendChild(ov);
  const ta=box.querySelector('textarea');ta.focus();ta.select();
}
</script>
